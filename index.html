<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel GOP · Gestão de Metas</title>
  <meta name="description" content="Painel de acompanhamento mensal de metas de colaboradores." />

  <!-- Tailwind (Play CDN: compila as classes utilitárias no navegador) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    html, body, #root { height: 100%; margin: 0; }
    #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            font-family: Inter, system-ui, sans-serif; color: #65748A; background: #EDF0F3; padding: 16px; }
    #boot .box { max-width: 560px; padding: 22px 26px; background: #fff; border: 1px solid #E1E6EB;
                 border-radius: 14px; color: #15212C; line-height: 1.55; }
    #boot .muted { color: #65748A; font-size: 14px; }
    #boot code { background: #F0F2F5; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot"><div class="box">Carregando painel… <span id="bootstep" class="muted"></span></div></div>
  </div>

  <!-- Carregador robusto: tenta vários CDNs em sequência para cada biblioteca.
       Para tornar 100% offline, baixe os arquivos para a pasta /vendor (veja README);
       o carregador usa eles primeiro automaticamente. -->
  <script>
  (function () {
    var step = document.getElementById("bootstep");
    function setStep(t){ if (step) step.textContent = t; }
    function fail(msg) {
      var b = document.getElementById("boot");
      if (b) b.innerHTML = '<div class="box"><b>Não foi possível carregar o painel.</b><br>' + msg +
        '<br><br><span class="muted">As bibliotecas são baixadas da internet (CDN). ' +
        'Se você está numa rede corporativa, ela pode estar bloqueando esses endereços. ' +
        'Nesse caso, use a versão com bibliotecas locais (pasta <code>vendor</code>) descrita no README, ' +
        'ou peça à TI para liberar <code>jsdelivr.net</code>, <code>cdnjs.cloudflare.com</code> e <code>unpkg.com</code>.</span></div>';
    }

    function loadFirst(urls, check) {
      return new Promise(function (resolve, reject) {
        var i = 0;
        function tryNext() {
          if (i >= urls.length) { reject(new Error("todas as fontes falharam")); return; }
          var url = urls[i++];
          var s = document.createElement("script");
          s.src = url; s.async = false;
          s.onload = function () { if (!check || check()) resolve(url); else tryNext(); };
          s.onerror = function () { s.remove(); tryNext(); };
          document.head.appendChild(s);
        }
        tryNext();
      });
    }

    var RV = "18.3.1", RC = "2.12.7", XV = "0.18.5";
    var libs = [
      { name: "React", check: function(){ return !!window.React; }, urls: [
        "./vendor/react.production.min.js",
        "https://cdn.jsdelivr.net/npm/react@"+RV+"/umd/react.production.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/react/"+RV+"/umd/react.production.min.js",
        "https://unpkg.com/react@"+RV+"/umd/react.production.min.js" ] },
      { name: "ReactDOM", check: function(){ return !!window.ReactDOM; }, urls: [
        "./vendor/react-dom.production.min.js",
        "https://cdn.jsdelivr.net/npm/react-dom@"+RV+"/umd/react-dom.production.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/react-dom/"+RV+"/umd/react-dom.production.min.js",
        "https://unpkg.com/react-dom@"+RV+"/umd/react-dom.production.min.js" ] },
      { name: "react-is", check: function(){ return !!window.ReactIs; }, urls: [
        "./vendor/react-is.production.min.js",
        "https://cdn.jsdelivr.net/npm/react-is@"+RV+"/umd/react-is.production.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/react-is/"+RV+"/umd/react-is.production.min.js",
        "https://unpkg.com/react-is@"+RV+"/umd/react-is.production.min.js" ] },
      { name: "Recharts", check: function(){ return !!window.Recharts; }, urls: [
        "./vendor/Recharts.min.js",
        "https://cdn.jsdelivr.net/npm/recharts@"+RC+"/umd/Recharts.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/recharts/"+RC+"/Recharts.min.js",
        "https://unpkg.com/recharts@"+RC+"/umd/Recharts.min.js" ] },
      { name: "XLSX", check: function(){ return !!window.XLSX; }, urls: [
        "./vendor/xlsx.full.min.js",
        "https://cdn.jsdelivr.net/npm/xlsx@"+XV+"/dist/xlsx.full.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/xlsx/"+XV+"/xlsx.full.min.js",
        "https://unpkg.com/xlsx@"+XV+"/dist/xlsx.full.min.js" ] },
      { name: "Ícones", check: function(){ return !!window.Icons; }, urls: [ "./icons.js" ] },
    ];

    (function run(idx) {
      if (idx >= libs.length) {
        setStep("");
        var s = document.createElement("script");
        s.src = "./app.js";
        s.onerror = function () { fail("Arquivo <code>app.js</code> não encontrado."); };
        document.body.appendChild(s);
        return;
      }
      var lib = libs[idx];
      setStep("(" + lib.name + ")");
      loadFirst(lib.urls, lib.check)
        .then(function () { run(idx + 1); })
        .catch(function () { fail(lib.name + " não carregou de nenhuma fonte."); });
    })(0);
  })();
  </script>
</body>
</html>
