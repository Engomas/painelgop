<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel GOP</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Botão de menu (mobile) -->
  <button id="btnMenu" class="btn-menu" aria-label="Abrir menu">☰</button>

  <!-- Menu lateral -->
  <aside id="menuLateral" class="menu">
    <div class="menu-topo">
      <div class="logo">
        <span class="logo-marca">GOP</span>
        <span class="logo-sub">Gestão · Operação · Premiação</span>
      </div>
    </div>
    <nav class="menu-nav">
      <button class="nav-item" data-tela="visao">Visão geral</button>
      <button class="nav-item" data-tela="importar">Importar planilha</button>
      <button class="nav-item" data-tela="admin">Administração</button>
    </nav>
    <div class="menu-rodape">
      <span id="versaoApp">v1.0.0</span>
    </div>
  </aside>
  <div id="overlay" class="overlay"></div>

  <!-- Conteúdo principal -->
  <main id="conteudo" class="conteudo"></main>

  <!-- Modal genérico -->
  <div id="modal" class="modal-fundo" hidden>
    <div class="modal-caixa" role="dialog" aria-modal="true">
      <button class="modal-fechar" id="modalFechar" aria-label="Fechar">✕</button>
      <div id="modalConteudo"></div>
    </div>
  </div>

  <!-- Aviso (toast) -->
  <div id="toast" class="toast" hidden></div>

  <script src="xlsx.js"></script>
  <script src="regras.js"></script>
  <script src="pptx.js"></script>
  <script src="app.js"></script>
</body>
</html>
